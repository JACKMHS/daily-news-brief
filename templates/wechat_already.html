<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Already subscribed</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#0F1117;color:#E8EAF6;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#1A1D2E;border:1px solid #2e3254;border-radius:14px;
          padding:40px 32px;max-width:400px;width:100%;text-align:center}
    .icon{font-size:3rem;margin-bottom:16px}
    h1{font-size:1.5rem;font-weight:800;margin-bottom:10px}
    p{color:#8892B0;font-size:.9rem;margin-bottom:20px}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
    .chip{background:rgba(108,92,231,.15);border:1px solid rgba(108,92,231,.35);
          color:#a29bfe;border-radius:100px;padding:4px 13px;font-size:.8rem;font-weight:600}
    a{color:#a29bfe;font-size:.85rem}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">👋</div>
  <h1>You're already subscribed, {{ name }}!</h1>
  <p>Your daily brief is on its way every morning.</p>
  {% if topics %}
  <div class="chips">
    {% for t in topics %}<span class="chip">{{ t.icon }} {{ t.label }}</span>{% endfor %}
  </div>
  {% endif %}
  <a href="/unsubscribe?token={{ unsubscribe_token }}">Unsubscribe</a>
</div>
</body>
</html>
