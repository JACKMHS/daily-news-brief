<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Error</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#0F1117;color:#E8EAF6;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#1A1D2E;border:1px solid #2e3254;border-radius:14px;
          padding:40px 32px;max-width:400px;width:100%;text-align:center}
    .icon{font-size:3rem;margin-bottom:16px}
    h1{font-size:1.4rem;font-weight:800;margin-bottom:10px}
    p{color:#8892B0;font-size:.9rem;margin-bottom:24px}
    a{display:inline-block;padding:11px 26px;background:linear-gradient(135deg,#6C5CE7,#5849c2);
      color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">⚠️</div>
  <h1>Something went wrong</h1>
  <p>{{ msg }}</p>
  <a href="/">Try again →</a>
</div>
</body>
</html>
